name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Lint & Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare local license public key
        shell: pwsh
        run: Copy-Item electron/license-public-key.example.cjs electron/license-public-key.cjs

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  test:
    name: Unit & Integration Tests
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare local license public key
        shell: pwsh
        run: Copy-Item electron/license-public-key.example.cjs electron/license-public-key.cjs

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: reports/vitest-junit.xml
          retention-days: 14

      - name: Annotate test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: reports/vitest-junit.xml
          check_name: Vitest Results
          fail_on_failure: true
