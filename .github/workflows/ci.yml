name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare local license public key
        shell: pwsh
        run: Copy-Item electron/license-public-key.example.cjs electron/license-public-key.cjs

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
